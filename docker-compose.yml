services:
  postgres:
    image: postgres:16-alpine
    container_name: trendbuy-postgres
    environment:
      POSTGRES_DB: trendbuy
      POSTGRES_USER: trendbuy
      POSTGRES_PASSWORD: trendbuy
    ports:
      - "5432:5432"
    volumes:
      - trendbuy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendbuy -d trendbuy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trendbuy-redis
    ports:
      - "6379:6379"
    volumes:
      - trendbuy_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  trendbuy_postgres_data:
  trendbuy_redis_data:
