services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trendbuy
      POSTGRES_USER: trendbuy
      POSTGRES_PASSWORD: trendbuy
    volumes:
      - trendbuy_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trendbuy_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - trendbuy_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trendbuy_net

  api:
    build:
      context: ./backend-trendbuy
      dockerfile: Dockerfile
    env_file:
      - ./backend-trendbuy/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://trendbuy:trendbuy@db:5432/trendbuy
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - trendbuy_net

  celery_worker:
    build:
      context: ./backend-trendbuy
      dockerfile: Dockerfile
    command: ["celery", "-A", "services.celery_app.celery_app", "worker", "--loglevel=info"]
    env_file:
      - ./backend-trendbuy/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://trendbuy:trendbuy@db:5432/trendbuy
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - trendbuy_net

  celery_beat:
    build:
      context: ./backend-trendbuy
      dockerfile: Dockerfile
    command: ["celery", "-A", "services.celery_app.celery_app", "beat", "--loglevel=info"]
    env_file:
      - ./backend-trendbuy/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://trendbuy:trendbuy@db:5432/trendbuy
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - trendbuy_net

  # Daily pg_dump to a separate named volume, with a 14-day retention sweep.
  # This is a floor, not a full backup strategy - it lives on the same host
  # as the database it's backing up, so it protects against "oops, bad
  # migration / accidental DELETE", not against losing the whole machine.
  # For real disaster recovery, also copy trendbuy_backups off-host
  # (rsync/rclone to another machine or object storage) on some cadence.
  #
  # Restore: docker compose exec -T db psql -U trendbuy -d trendbuy < dump.sql
  # (gunzip the .sql.gz first, and the target DB should be empty/fresh).
  db_backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: trendbuy
    volumes:
      - trendbuy_backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trendbuy_net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          FILENAME="/backups/trendbuy_$$(date +%Y%m%d_%H%M%S).sql.gz"
          echo "[db_backup] Dumping to $$FILENAME"
          pg_dump -h db -U trendbuy -d trendbuy | gzip > "$$FILENAME"
          find /backups -name 'trendbuy_*.sql.gz' -mtime +14 -delete
          sleep 86400
        done

  frontend:
    build:
      context: ./frontend-trendbuy
      dockerfile: Dockerfile
    environment:
      # Server-only: read by next.config.ts (rewrites) and Server Components.
      # Not NEXT_PUBLIC_ - the browser can't resolve "api", the Next.js server
      # proxies for it via the /backend/* rewrite. See frontend-trendbuy/README.
      API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - trendbuy_net

volumes:
  trendbuy_postgres_data:
  trendbuy_redis_data:
  trendbuy_backups:

networks:
  trendbuy_net:
    driver: bridge
