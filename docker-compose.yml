version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trendbuy
      POSTGRES_USER: trendbuy
      POSTGRES_PASSWORD: trendbuy
    volumes:
      - trendbuy_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - trendbuy_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend-trendbuy
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://trendbuy:trendbuy@db:5432/trendbuy
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - trendbuy_net

  celery_worker:
    build:
      context: ./backend-trendbuy
      dockerfile: Dockerfile
    command: ["celery", "-A", "services.celery_app.celery_app", "worker", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql+asyncpg://trendbuy:trendbuy@db:5432/trendbuy
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - trendbuy_net

  frontend:
    build:
      context: ./frontend-trendbuy
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - trendbuy_net

volumes:
  trendbuy_postgres_data:
  trendbuy_redis_data:

networks:
  trendbuy_net:
    driver: bridge
